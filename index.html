<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Fleeca Produtos GTA Online</title>

  <!-- FONTE -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- BOOTSTRAP -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

</head>

<body>

  <!-- HEADER -->
  <header>

    <h1 class="logo">FLEECA DIGITAL BANK</h1>

    <p class="subtitle">Produtos GTA Online</p>

  </header>

  <!-- CARD SLIDER -->
  <section class="container py-5">

    <div class="card gta-card p-4 text-center">

      <h3>Escolha seu GTA$</h3>

      <input
        type="range"
        class="form-range mt-3"
        min="0"
        max="2"
        value="0"
        id="sliderQuantidade"
      >

      <h2 id="valorGTA">1.500.000</h2>

      <div id="precoSelecionado" class="price">R$ 7,00</div>

      <a id="botaoPagamento" href="#" class="btn btn-success w-100 mt-3">
        PAGAR NO WHATSAPP
      </a>

    </div>

  </section>

  <!-- JS -->
  <script>
    const slider = document.getElementById("sliderQuantidade");
    const valorGTA = document.getElementById("valorGTA");
    const preco = document.getElementById("precoSelecionado");
    const botao = document.getElementById("botaoPagamento");

    const dados = [
      {
        gta: "1.500.000",
        preco: "R$ 7,00"
      },
      {
        gta: "3.000.000",
        preco: "R$ 14,00"
      },
      {
        gta: "6.000.000",
        preco: "R$ 28,00"
      }
    ];

    function atualizar() {
      const item = dados[slider.value];

      valorGTA.innerText = item.gta;
      preco.innerText = item.preco;

      botao.href =
        "https://wa.me/5541992878220?text=Olá,%20quero%20comprar%20" +
        item.gta +
        "%20por%20" +
        item.preco;
    }

    slider.addEventListener("input", atualizar);

    atualizar();
  </script>

</body>

</html>
