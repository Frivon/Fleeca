<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Catálogo GTA Online</title>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet">

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Orbitron", sans-serif;
    }

    body {
      background: radial-gradient(circle at top, #0b1a12, #050805);
      color: white;
    }

    /* HEADER */

    header {
      text-align: center;
      padding: 50px 20px;
      border-bottom: 2px solid #00ff88;
    }

    header h1 {
      color: #00ff88;
      font-size: 2.5rem;
      text-shadow: 0 0 15px #00ff88;
    }

    header p {
      color: #ccc;
      margin-top: 10px;
    }

    /* CATALOGO */

    .catalogo {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 80px;
      padding: 70px;
      justify-items: center;
    }

    /* CARD VEÍCULO */

    .vehicle-card {
      background: rgba(15, 15, 15, 0.95);
      border: 1px solid #00ff88;
      border-radius: 18px;

      width: 260px;
      padding: 15px;

      text-align: center;

      transition: 0.3s;
      box-shadow: 0 0 20px rgba(0,255,120,0.15);
    }

    .vehicle-card:hover {
      transform: translateY(-10px);
      box-shadow: 0 0 35px rgba(0,255,120,0.35);
    }

    /* PREÇO */

    .price {
      color: #00ff88;
      font-size: 1.2rem;
      font-weight: bold;
      margin-bottom: 10px;
    }

    /* FRAME DA IMAGEM (estilo vitrine GTA) */

    .image-frame {
      width: 100%;
      height: 160px;

      background: #0a0f0a;
      border: 1px solid rgba(0,255,136,0.4);
      border-radius: 12px;

      display: flex;
      align-items: center;
      justify-content: center;

      overflow: hidden;

      box-shadow: inset 0 0 15px rgba(0,255,136,0.1);
      margin-bottom: 15px;
    }

    .image-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover; /* 🔥 deixa tipo showroom GTA */
    }

    /* BOTÃO */

    .buy-btn {
      width: 100%;
      padding: 12px;

      background: #00ff88;
      border: none;
      border-radius: 10px;

      font-weight: bold;
      cursor: pointer;

      transition: 0.3s;
      color: black;
    }

    .buy-btn:hover {
      background: #00cc6f;
      transform: scale(1.05);
    }

     .back-btn {
    display: inline-block;
    margin-top: 25px;
    background: #00ff88;
    color: black;
    padding: 14px 30px;
    border-radius: 12px;
    text-decoration: none;
    font-weight: bold;
    transition: 0.3s;
  }

  .back-btn:hover {
    background: #00cc6f;
    transform: scale(1.05);
  }

  </style>
</head>

<body>

  <header>
    <h1>Catálogo de Veículos</h1>
    <p>GTA Online - Fleeca Motors</p>
  </header>

  <section class="catalogo">

    <!-- VEÍCULO 1 -->
    <div class="vehicle-card">

      <div class="price">💸 R$ 15,00</div>

      <div class="image-frame">
        <img src="https://media.discordapp.net/attachments/1335891239660163114/1429928654846169280/Gemini_Generated_Image_hrv3pthrv3pthrv3.png?ex=6a10bbd6&is=6a0f6a56&hm=f3df68a5c005979b477b5f77c322b905409bd3ad3c31ac54f65130af9607c917&=&format=webp&quality=lossless&width=1055&height=770">
      </div>

      <button class="buy-btn">Comprar</button>
    </div>

    <!-- VEÍCULO 2 -->
    <div class="vehicle-card">

      <div class="price">💸 R$ 10,00</div>

      <div class="image-frame">
        <img src="https://media.discordapp.net/attachments/1335891239660163114/1429925878241951754/Gemini_Generated_Image_boe5nzboe5nzboe5.png?ex=6a10b940&is=6a0f67c0&hm=0276b89de9713b5840b9d69b7e547bb9e7e30a07f712345c4b48de621258f1f2&=&format=webp&quality=lossless&width=1155&height=770">
      </div>

      <button class="buy-btn">Comprar</button>
    </div>
    
    <!-- VEÍCULO 3 -->
    <div class="vehicle-card">

      <div class="price">💸 R$ 10,00</div>

      <div class="image-frame">
        <img src="https://cdn.discordapp.com/attachments/1335891239660163114/1429925359347826688/Gemini_Generated_Image_855jn2855jn2855j.png?ex=6a10b8c4&is=6a0f6744&hm=06d0c7a123b04749e93b5cae2aa5d441f8371316dde53467555e4ea947f9ce78&">
      </div>

      <button class="buy-btn">Comprar</button>
    </div>

        <!-- VEÍCULO 4 -->
    <div class="vehicle-card">

      <div class="price">💸 R$ 10,00</div>

      <div class="image-frame">
        <img src="https://cdn.discordapp.com/attachments/1335891239660163114/1429925359347826688/Gemini_Generated_Image_855jn2855jn2855j.png?ex=6a10b8c4&is=6a0f6744&hm=06d0c7a123b04749e93b5cae2aa5d441f8371316dde53467555e4ea947f9ce78&">
      </div>

      <button class="buy-btn">Comprar</button>
    </div>

  </section>

  <a href="index.html" class="back-btn">
      <i class="fa-solid fa-arrow-left"></i>
      Voltar
    </a>

</body>
</html>
