<!DOCTYPE html>
<html lang="pt-BR">
<head>

    </div>

    <!-- CARD 2 -->
    <div class="produto-card">

      <div class="produto-preco">💸 R$ 10,00</div>

      <img src="https://media.discordapp.net/attachments/1335891239660163114/1429925878241951754/Gemini_Generated_Image_boe5nzboe5nzboe5.png"
