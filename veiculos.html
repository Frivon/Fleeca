<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Catálogo GTA Online</title>

  <!-- GOOGLE FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- FONT AWESOME -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <!-- BOOTSTRAP -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Orbitron", sans-serif;
    }

    body {
      background: radial-gradient(circle at top, #0b1a12, #050805);
      color: white;
      overflow-x: hidden;
    }

    /* HEADER */
    header {
      text-align: center;
      padding: 50px 20px;
      border-bottom: 2px solid #00ff88;
      margin-bottom: 40px;
    }

    header h1 {
      color: #00ff88;
      font-size: 2.5rem;
      text-shadow: 0 0 15px #00ff88;
    }

    header p {
      color: #ccc;
      margin-top: 10px;
    }

    /* CARD */
    .vehicle-card {
      background: rgba(15, 15, 15, 0.95);
      border: 1px solid #00ff88;
      border-radius: 18px;
      padding: 15px;
      text-align: center;
      transition: 0.3s;
      box-shadow: 0 0 20px rgba(0,255,120,0.15);
      height: 100%;
    }

    .vehicle-card:hover {
      transform: translateY(-10px);
      box-shadow: 0 0 35px rgba(0,255,120,0.35);
    }

    /* NOME */
    .vehicle-name {
      color: #00ff88;
      font-size: 1.3rem;
      margin-bottom: 10px;
      text-shadow: 0 0 10px #00ff88;
    }

    /* PREÇO */
    .price {
      color: #00ff88;
      font-size: 1.2rem;
      font-weight: bold;
      margin-bottom: 15px;
    }

    /* IMAGEM */
    .image-frame {
      width: 100%;
      height: 180px;
      background: #0a0f0a;
      border: 1px solid rgba(0,255,136,0.4);
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 15px;
      box-shadow: inset 0 0 15px rgba(0,255,136,0.1);
    }

    .image-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* BOTÃO */
    .buy-btn {
      display: inline-block;
      width: 100%;
      padding: 12px;
      background: #00ff88;
      border-radius: 10px;
      text-decoration: none;
      font-weight: bold;
      color: black;
      transition: 0.3s;
    }

    .buy-btn:hover {
      background: #00cc6f;
      transform: scale(1.03);
      color: black;
    }

    /* BOTÃO VOLTAR */
    .back-btn {
      display: inline-block;
      margin-top: 40px;
      background: #00ff88;
      color: black;
      padding: 14px 30px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
    }

    .back-btn:hover {
      background: #00cc6f;
      transform: scale(1.05);
      color: black;
    }

  </style>

</head>

<body>

  <!-- HEADER -->
  <header>

    <h1>Catálogo de Veículos</h1>

    <p>GTA Online - Fleeca Motors</p>

  </header>

  <!-- CATÁLOGO -->
  <section class="container">

    <div class="row g-4 justify-content-center">

      <!-- VEÍCULO 1 -->
      <div class="col-12 col-sm-6 col-lg-3">

        <div class="vehicle-card">

          <h2 class="vehicle-name">Tanque Dollar</h2>

          <div class="price">💸 R$ 15,00</div>

          <div class="image-frame">
            <img src="https://media.discordapp.net/attachments/1335891239660163114/1429928654846169280/Gemini_Generated_Image_hrv3pthrv3pthrv3.png?ex=6a10bbd6&is=6a0f6a56&hm=f3df68a5c005979b477b5f77c322b905409bd3ad3c31ac54f65130af9607c917&=&format=webp&quality=lossless&width=1055&height=770">
          </div>

          <a 
            class="buy-btn"
            href="https://wa.me/5541992878220?text=Ol%C3%A1%2C%20tenho%20interesse%20no%20Tanque%20Dollar%20-%20R%24%2015%2C00"
            target="_blank"
          >
            Comprar
          </a>

        </div>

      </div>

      <!-- VEÍCULO 2 -->
      <div class="col-12 col-sm-6 col-lg-3">

        <div class="vehicle-card">

          <h2 class="vehicle-name">Super Car</h2>

          <div class="price">💸 R$ 10,00</div>

          <div class="image-frame">
            <img src="https://media.discordapp.net/attachments/1335891239660163114/1429925878241951754/Gemini_Generated_Image_boe5nzboe5nzboe5.png?ex=6a10b940&is=6a0f67c0&hm=0276b89de9713b5840b9d69b7e547bb9e7e30a07f712345c4b48de621258f1f2&=&format=webp&quality=lossless&width=1155&height=770">
          </div>

          <a class="buy-btn" href="#">
            Comprar
          </a>

        </div>

      </div>

      <!-- VEÍCULO 3 -->
      <div class="col-12 col-sm-6 col-lg-3">

        <div class="vehicle-card">

          <h2 class="vehicle-name">Night Racer</h2>

          <div class="price">💸 R$ 10,00</div>

          <div class="image-frame">
            <img src="https://cdn.discordapp.com/attachments/1335891239660163114/1429925359347826688/Gemini_Generated_Image_855jn2855jn2855j.png">
          </div>

          <a class="buy-btn" href="#">
            Comprar
          </a>

        </div>

      </div>

      <!-- VEÍCULO 4 -->
      <div class="col-12 col-sm-6 col-lg-3">

        <div class="vehicle-card">

          <h2 class="vehicle-name">Elite Car</h2>

          <div class="price">💸 R$ 10,00</div>

          <div class="image-frame">
            <img src="https://cdn.discordapp.com/attachments/1335891239660163114/1429922053871374428/Gemini_Generated_Image_z9ehvxz9ehvxz9eh.png">
          </div>

          <a class="buy-btn" href="#">
            Comprar
          </a>

        </div>

      </div>

    </div>

    <!-- BOTÃO VOLTAR -->
    <div class="text-center">

      <a href="index.html" class="back-btn">
        <i class="fa-solid fa-arrow-left"></i>
        Voltar
      </a>

    </div>

  </section>

  <!-- BOOTSTRAP JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
