<!DOCTYPE html>

  <!-- GOOGLE FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <!-- BOOTSTRAP -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Orbitron", sans-serif;
    }

    body {
      background: radial-gradient(circle at top, #0b1a12, #050805);
      color: white;
      overflow-x: hidden;
    }

    /* HEADER */
    header {
      text-align: center;
      padding: 50px 20px;
      border-bottom: 2px solid #00ff88;
      margin-bottom: 40px;
    }

    header h1 {
      color: #00ff88;
      font-size: 2.5rem;
      text-shadow: 0 0 15px #00ff88;
    }

    header p {
      color: #ccc;
      margin-top: 10px;
    }

    /* CARD */
    .vehicle-card {
      background: rgba(15, 15, 15, 0.95);
      border: 1px solid #00ff88;
      border-radius: 18px;
      padding: 15px;
      text-align: center;
      transition: 0.3s;
      box-shadow: 0 0 20px rgba(0,255,120,0.15);
      height: 100%;
    }

    .vehicle-card:hover {
      transform: translateY(-10px);
      box-shadow: 0 0 35px rgba(0,255,120,0.35);
    }

    /* NOME */
    .vehicle-name {
      color: #00ff88;
      font-size: 1.3rem;
      margin-bottom: 10px;
      text-shadow: 0 0 10px #00ff88;
    }

    /* PREÇO */
    .price {
      color: #00ff88;
      font-size: 1.2rem;
      font-weight: bold;
      margin-bottom: 15px;
    }

    /* IMAGEM */
    .image-frame {
      width: 100%;
      height: 180px;
      background: #0a0f0a;
      border: 1px solid rgba(0,255,136,0.4);
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 15px;
      box-shadow: inset 0 0 15px rgba(0,255,136,0.1);
    }

    .image-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* BOTÃO */
    .buy-btn {
      display: inline-block;
      width: 100%;
      padding: 12px;
      background: #00ff88;
      border-radius: 10px;
      text-decoration: none;
      font-weight: bold;
      color: black;
      transition: 0.3s;
    }

    .buy-btn:hover {
      background: #00cc6f;
      transform: scale(1.03);
      color: black;
    }

    /* BOTÃO VOLTAR */
    .back-btn {
      display: inline-block;
      margin-top: 40px;
      background: #00ff88;
      color: black;
      padding: 14px 30px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
    }

    .back-btn:hover {
      background: #00cc6f;
      transform: scale(1.05);
      color: black;
    }

  </style>

</head>
